name: jeb
description: "Jeb — a private, local-first expense tracker."
publish_to: "none"
version: 1.0.0+4

homepage: https://www.mujtaba.cc
repository: https://github.com/iammujtaba44/jeb
issue_tracker: https://github.com/iammujtaba44/jeb/issues
funding:
  - https://github.com/sponsors/iammujtaba44
  - https://buymeacoffee.com/immujtaba9h

environment:
  sdk: ^3.9.0

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # State management (Cubit)
  flutter_bloc: ^9.1.1
  equatable: ^2.0.7

  # Dependency injection
  get_it: ^8.0.3

  # Functional error handling (Either<Failure, Success>)
  dartz: ^0.10.1

  # Local-first storage
  sqflite: ^2.4.1
  path: ^1.9.1
  path_provider: ^2.1.5

  # Cloud sync transport (Apple iCloud Drive)
  icloud_storage: ^2.2.0

  # Settings persistence
  shared_preferences: ^2.3.5

  # Biometric app lock
  local_auth: ^2.3.0

  # Local notifications (daily spending reminder)
  flutter_local_notifications: ^18.0.1
  timezone: ^0.9.4
  flutter_timezone: ^3.0.1

  # Receipt photos (camera / gallery)
  image_picker: ^1.1.2

  # Export & share (CSV / PDF)
  share_plus: ^10.1.4
  pdf: ^3.11.1
  printing: ^5.13.4

  # Iconography (Phosphor — regular/fill weights for nav bar)
  phosphor_flutter: ^2.1.0

  # Charts
  fl_chart: ^0.69.2

  # Typography
  google_fonts: ^6.2.1

  # Utilities
  intl: ^0.20.2
  uuid: ^4.5.1

  # Open external links (sponsor / portfolio)
  url_launcher: ^6.3.0

  # Google Drive backup (Android) — sign in with the user's own Google account
  google_sign_in: ^6.2.1
  googleapis: ^13.2.0
  extension_google_sign_in_as_googleapis_auth: ^2.0.12

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^5.0.0
  bloc_test: ^10.0.0
  mocktail: ^1.0.4
  flutter_launcher_icons: ^0.14.3
  flutter_native_splash: ^2.4.4

# App launcher icon (run: dart run flutter_launcher_icons)
flutter_launcher_icons:
  image_path: "assets/icon/icon.png"
  android: true
  ios: true
  remove_alpha_ios: true
  adaptive_icon_background: "#2E7D5B"
  adaptive_icon_foreground: "assets/icon/icon_foreground.png"

# Splash screen (run: dart run flutter_native_splash:create)
flutter_native_splash:
  color: "#2E7D5B"
  image: assets/icon/icon_foreground.png
  android_12:
    color: "#2E7D5B"
    image: assets/icon/icon_foreground.png

flutter:
  uses-material-design: true
